description: >-
  FinOps view of MyScale Cloud spend. MyScale bills on a pod-based model rather
  than per-API-call: cost is driven by the number and size of provisioned pods
  (capacity-optimized and performance), replica count for high availability, and
  metered storage. A free Development tier carries no charge but is capacity- and
  inactivity-limited, and the open-source MyScaleDB engine (Apache-2.0) can be
  self-hosted with only infrastructure cost. Spend is therefore optimized by
  right-sizing pods, controlling replicas, and using the free or self-hosted
  paths for non-production workloads.
notes: >-
  Pod and storage rates vary by cloud, region, and size; verify against the
  MyScale pricing page and Price Estimator during reconciliation.
