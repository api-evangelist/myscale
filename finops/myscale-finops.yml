meters:
- name: pod_hours
  description: Provisioned pod runtime (capacity-optimized or performance), billed per pod per month / hour.
  unit: pod-hours
  aggregation: sum
  dimensions:
  - account
  - cluster
  - pod_type
- name: replica_pods
  description: Additional replica pods provisioned for high availability, billed like base pods.
  unit: pod-hours
  aggregation: sum
  dimensions:
  - account
  - cluster
- name: storage_gb
  description: Persistent storage consumed by tables, vectors, and indexes, metered per GB.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - cluster
principles:
- name: Visibility
  description: Track per-cluster pod count, pod size, replicas, and storage from the MyScale console; map clusters to workloads.
- name: Allocation
  description: Separate clusters per team / environment so pod and storage spend maps cleanly to cost centers.
- name: Optimization
  description: Right-size pods, prefer capacity-optimized pods for storage-heavy workloads, minimize replicas where HA is not required, use the free Development tier or self-hosted Apache-2.0 MyScaleDB for non-production, and let idle Development clusters terminate.
- name: Accountability
  description: Assign owners per cluster; review pod and storage spend monthly against budget.
